<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ code }} — MentorBridge</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #07090f; color: #e8eaf0;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  text-align: center; padding: 20px;
}
.code { font-family: 'Syne', sans-serif; font-size: 8rem; font-weight: 800; line-height: 1;
  background: linear-gradient(135deg, #4f8ef7, #7c5cfc); -webkit-background-clip: text;
  -webkit-text-fill-color: transparent; background-clip: text; }
h1 { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 700; margin: 16px 0 8px; }
p { color: rgba(232,234,240,0.5); margin-bottom: 32px; }
a {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 24px; border-radius: 8px;
  background: linear-gradient(135deg, #4f8ef7, #7c5cfc); color: #fff;
  text-decoration: none; font-weight: 600; font-size: 0.9rem;
}
</style>
</head>
<body>
<div>
  <div class="code">{{ code }}</div>
  <h1>{{ message }}</h1>
  <p>The page you're looking for doesn't exist or you don't have access.</p>
  <a href="/">← Back to Home</a>
</div>
</body>
</html>
