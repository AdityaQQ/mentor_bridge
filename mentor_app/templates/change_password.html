{% extends "base.html" %}
{% block title %}Change Password — MentorBridge{% endblock %}
{% block page_title %}Change Password{% endblock %}

{% block content %}
<div class="page-header fade-up">
  <h2>Change Password</h2>
  <p>Update your account password</p>
</div>

<div class="card fade-up delay-1" style="max-width:480px">
  <div class="card-header"><span><i class="fas fa-lock" style="margin-right:8px;opacity:0.5"></i>Update Password</span></div>
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label class="form-label">Current Password</label>
        <input type="password" name="current_password" class="input-field" placeholder="••••••••" required>
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" name="new_password" class="input-field" placeholder="Minimum 6 characters" required>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input type="password" name="confirm_password" class="input-field" placeholder="Repeat new password" required>
      </div>
      <div class="flex gap-2 mt-2">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update Password</button>
        <a href="{{ url_for('profile') }}" class="btn btn-outline">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
